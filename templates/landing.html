<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Company Survey</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f3f4f6;font-family:"Segoe UI",sans-serif}
    .wrap{max-width:900px;margin:40px auto;padding:0 14px}
    .card-soft{border-radius:14px;background:#fff;border:1px solid #e5e7eb;box-shadow:0 4px 10px rgba(0,0,0,.05)}
    .muted{color:#6b7280}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card-soft p-4">
    <h3 class="mb-1">Employee Survey</h3>
    <p class="muted mb-4">Please complete this short internal survey.</p>

    <!-- This is the "campaign form" -->
    <form method="POST" action="/l/{{ token }}/form-submit">

      <div class="mb-3">
        <label class="form-label">Employee Name</label>
        <input class="form-control" name="emp_name" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Department</label>
        <select class="form-select" name="dept" required>
          <option value="">Select</option>
          <option>HR</option>
          <option>IT</option>
          <option>Payroll</option>
          <option>Security</option>
          <option>Other</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Rate your satisfaction</label>
        <select class="form-select" name="rating" required>
          <option value="">Select</option>
          <option>Excellent</option>
          <option>Good</option>
          <option>Average</option>
          <option>Bad</option>
        </select>
      </div>

      <button class="btn btn-danger w-100">Submit Survey</button>
    </form>

    <div class="alert alert-warning mt-4 mb-0">
      This is a training simulation. Do not enter passwords anywhere.
    </div>
  </div>
</div>
</body>
</html>
