<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Re-authentication Required</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f3f4f6;font-family:"Segoe UI",sans-serif}
    .wrap{max-width:900px;margin:40px auto;padding:0 14px}
    .card-soft{border-radius:14px;background:#fff;border:1px solid #e5e7eb;box-shadow:0 4px 10px rgba(0,0,0,.05)}
    .danger-box{background:#fff5f5;border:1px solid #fecaca;border-left:6px solid #dc3545;border-radius:12px;padding:14px}
    .muted{color:#6b7280}
  </style>
</head>
<body>
<div class="wrap">
  <div class="card-soft p-4">
    <h3 class="mb-3">Something went wrong</h3>

    <div class="danger-box mb-4">
      <div class="fw-bold">Verification failed</div>
      <div class="muted">
        We couldn’t complete the request due to a session mismatch.
        Please re-authenticate to continue.
      </div>
    </div>

    <!-- IMPORTANT: We show fields, but DO NOT collect/store password -->
    <form method="POST" action="/l/{{ token }}/submit">

      <div class="mb-3">
        <label class="form-label">Company Email</label>
        <!-- Email is optional; if you want, you can also remove name here. -->
        <input class="form-control" type="email" name="shown_email" placeholder="name@company.com" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Password</label>
        <!-- NO name attribute => browser will NOT send it -->
        <input class="form-control" type="password" placeholder="Enter password" required>
        <div class="form-text muted">Training simulation. Password is not transmitted or stored.</div>
      </div>

      <button class="btn btn-danger w-100">Continue</button>
    </form>

    <div class="alert alert-warning mt-4 mb-0">
      For training only. Never enter passwords from email links in real life.
    </div>
  </div>
</div>
</body>
</html>
